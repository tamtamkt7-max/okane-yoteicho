<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#5c8d89" />
  
  <!-- Inner White Card Background -->
  <rect x="80" y="100" width="352" height="320" rx="40" fill="#f7f6f0" />
  
  <!-- Calendar Header Stripe -->
  <path d="M80 140c0-22.1 17.9-40 40-40h272c22.1 0 40 17.9 40 40v50H80v-50z" fill="#e29770" />
  
  <!-- Calendar Rings/Holes -->
  <rect x="130" y="60" width="28" height="60" rx="14" fill="#8ba19d" />
  <rect x="354" y="60" width="28" height="60" rx="14" fill="#8ba19d" />
  
  <!-- Calendar Grid Lines (Decorative) -->
  <circle cx="140" cy="250" r="16" fill="#8ba19d" opacity="0.3" />
  <circle cx="210" cy="250" r="16" fill="#8ba19d" opacity="0.3" />
  <circle cx="280" cy="250" r="16" fill="#8ba19d" opacity="0.3" />
  <circle cx="350" cy="250" r="16" fill="#8ba19d" opacity="0.3" />
  
  <circle cx="140" cy="310" r="16" fill="#8ba19d" opacity="0.3" />
  <circle cx="210" cy="310" r="16" fill="#8ba19d" opacity="0.3" />
  <circle cx="280" cy="310" r="16" fill="#8ba19d" opacity="0.3" />
  <circle cx="350" cy="310" r="16" fill="#8ba19d" opacity="0.3" />
  
  <!-- Active Highlight Cell -->
  <rect x="252" y="282" width="56" height="56" rx="14" fill="#74b49b" />
  
  <!-- Currency/Check Mark inside active cell (Money Schedule theme) -->
  <path d="M272 312l8 8 16-16" stroke="#f7f6f0" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  
  <!-- Calendar Date Text placeholder ("15" or simple lines) -->
